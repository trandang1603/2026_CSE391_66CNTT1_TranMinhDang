<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản</title>
    <link rel="stylesheet" href="style2_04.css">
</head>
<body>

<div class="container">
    <div id="formContainer">
        <h2>Đăng Ký Tài Khoản</h2>
        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="fullname">Họ và tên *</label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên">
                <span class="error-message" id="fullname-error"></span>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" placeholder="name@gmail.com">
                <span class="error-message" id="email-error"></span>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại *</label>
                <input type="tel" id="phone" placeholder="Bắt đầu bằng số 0">
                <span class="error-message" id="phone-error"></span>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu *</label>
                <input type="password" id="password" placeholder="Tối thiểu 8 ký tự...">
                <span class="error-message" id="password-error"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu *</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                <span class="error-message" id="confirmPassword-error"></span>
            </div>

            <div class="form-group">
                <label>Giới tính *</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="Nam"> Nam</label>
                    <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
                    <label><input type="radio" name="gender" value="Khác"> Khác</label>
                </div>
                <span class="error-message" id="gender-error"></span>
            </div>

            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" id="terms">
                    Tôi đồng ý với các điều khoản và dịch vụ *
                </label>
                <span class="error-message" id="terms-error"></span>
            </div>

            <button type="submit" id="btnSubmit">Đăng Ký</button>
        </form>
    </div>

    <div id="successContainer" class="hidden">
        <h2>Đăng ký thành công! 🎉</h2>
        <p>Chào mừng <strong id="successName"></strong> đã tham gia cùng chúng tôi.</p>
    </div>
</div>

<script src="script2_04.js"></script>
</body>
</html>
