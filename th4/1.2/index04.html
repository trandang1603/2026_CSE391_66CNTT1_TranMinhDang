<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Điểm Sinh Viên Nâng Cao</title>
    <link rel="stylesheet" href="style04.css">
</head>
<body>

<div class="container">
    <h2>Quản Lý Điểm Sinh Viên</h2>

    <div class="input-group">
        <input type="text" id="txtName" placeholder="Họ tên sinh viên...">
        <input type="number" id="txtScore" placeholder="Điểm (0-10)" step="0.1">
        <button id="btnAdd">Thêm</button>
    </div>

    <div class="toolbar">
        <input type="text" id="txtSearch" placeholder="🔍 Tìm kiếm theo tên...">
        <select id="selFilter">
            <option value="All">Tất cả xếp loại</option>
            <option value="Giỏi">Giỏi</option>
            <option value="Khá">Khá</option>
            <option value="Trung bình">Trung bình</option>
            <option value="Yếu">Yếu</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th id="colScore" class="sortable">Điểm <span id="sortIcon"></span></th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentTableBody">
            </tbody>
    </table>

    <div class="summary">
        <span>Đang hiển thị: <span id="totalStudents">0</span> SV</span>
        <span>Điểm trung bình (danh sách hiện tại): <span id="avgScore">0</span></span>
    </div>
</div>

<script src="script04.js"></script>
</body>
</html>
