<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Điểm Sinh Viên</title>
    <link rel="stylesheet" href="style04.css">
</head>
<body>

<div class="container">
    <h2>Quản Lý Điểm Sinh Viên</h2>

    <div class="input-group">
        <input type="text" id="txtName" placeholder="Họ tên sinh viên...">
        <input type="number" id="txtScore" placeholder="Điểm (0-10)" step="0.1">
        <button id="btnAdd">Thêm</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentTableBody">
            </tbody>
    </table>

    <div class="summary">
        <span>Tổng số SV: <span id="totalStudents">0</span></span>
        <span>Điểm trung bình lớp: <span id="avgScore">0</span></span>
    </div>
</div>

    <script src="script04.js"></script>
</body>
</html>
